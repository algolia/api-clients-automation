name: Publish

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'

jobs:
  check:
    name: Run checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dart-lang/setup-dart@v1
      - name: Install Tools
        run: dart pub global activate melos
      - name: Bootstrap Workspace
        run: melos bootstrap
      - name: Install dependencies
        run: melos get
      - name: Check versions
        run: melos test

  publish_core:
    needs: check
    permissions:
      id-token: write
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
    with:
      working-directory: packages/client_core

  wait_for_core:
    needs: publish_core
    runs-on: ubuntu-latest
    steps:
      - name: Wait for core package to be published
        shell: bash
        run: sleep 300

  # First wave: packages that only depend on client_core. client_search is
  # excluded on purpose because it depends on client_ingestion and must wait
  # for it to be available on pub.dev (see publish_search below).
  publish_clients:
    needs:
      - check
      - wait_for_core
    strategy:
      # Don't let one failing package cancel the others (notably
      # client_ingestion, which client_search depends on).
      fail-fast: false
      matrix:
        package:
          - packages/client_insights
          - packages/client_recommend
          - packages/client_ingestion
          - packages/client_composition
          - packages/client_agent_studio
    permissions:
      id-token: write
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
    with:
      working-directory: ${{ matrix.package }}

  wait_for_dependencies:
    needs:
      - check
      - publish_core
      - publish_clients
    runs-on: ubuntu-latest
    steps:
      - name: Wait for dependency package to be published
        shell: bash
        run: sleep 300

  # Second wave: client_search depends on client_ingestion, so it can only be
  # published once the first wave is live on pub.dev.
  publish_search:
    needs:
      - check
      - publish_clients
      - wait_for_dependencies
    permissions:
      id-token: write
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
    with:
      working-directory: packages/client_search

  wait_for_search:
    needs: publish_search
    runs-on: ubuntu-latest
    steps:
      - name: Wait for search package to be published
        shell: bash
        run: sleep 300

  # Umbrella package depends on core, search, insights and ingestion.
  publish_algoliasearch:
    needs:
      - check
      - publish_search
      - wait_for_search
    permissions:
      id-token: write
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
    with:
      working-directory: packages/algoliasearch
