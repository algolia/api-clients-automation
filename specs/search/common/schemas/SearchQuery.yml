SearchQuery:
  oneOf:
    - $ref: '#/SearchForHits'
    - $ref: '#/SearchForFacets'

SearchForHits:
  allOf:
    - $ref: '../../../common/schemas/SearchParams.yml#/searchParams'
    - $ref: '#/searchForHitsOptions'

SearchForFacets:
  allOf:
    - $ref: '../../../common/schemas/SearchParams.yml#/searchParams'
    - $ref: '#/searchForFacetsOptions'
  x-discriminator-fields:
    - facet
    - type

searchForFacetsOptions:
  type: object
  properties:
    facet:
      type: string
      description: Facet name.
    indexName:
      $ref: '../../../common/parameters.yml#/indexName'
    facetQuery:
      $ref: '#/facetQuery'
    maxFacetHits:
      $ref: '../../../common/schemas/IndexSettings.yml#/maxFacetHits'
    type:
      $ref: '#/searchTypeFacet'
  required:
    - indexName
    - type
    - facet

facetQuery:
  type: string
  description: Text to search inside the facet's values.
  example: 'george'
  default: ''

searchForHitsOptions:
  # This option exists because TypeScript can't distinguish union with optional keys
  # if they are not completely the same, see usage in `templates/javascript/model.mustache`
  x-is-SearchForHitsOptions: true
  type: object
  properties:
    indexName:
      $ref: '../../../common/parameters.yml#/indexName'
    type:
      $ref: '#/searchTypeDefault'
    extensions:
      $ref: '#/searchExtensions'
  required:
    - indexName

searchTypeFacet:
  type: string
  enum: [facet]
  default: facet
  description: |
    - `default`: perform a search query
    - `facet` [searches for facet values](https://www.algolia.com/doc/guides/managing-results/refine-results/faceting/#search-for-facet-values).

searchTypeDefault:
  type: string
  enum: [default]
  default: default
  description: |
    - `default`: perform a search query
    - `facet` [searches for facet values](https://www.algolia.com/doc/guides/managing-results/refine-results/faceting/#search-for-facet-values).

searchExtensions:
  type: object
  description: |
    Additional parameters for Algolia AI features.
    Used to enable [Query Categorization](https://www.algolia.com/doc/guides/algolia-ai/query-categorization/) and other AI-powered capabilities.
  properties:
    queryCategorization:
      $ref: '#/searchExtensionsQueryCategorization'

searchExtensionsQueryCategorization:
  type: object
  description: Parameters for the [Query Categorization](https://www.algolia.com/doc/guides/algolia-ai/query-categorization/) AI feature.
  properties:
    enableCategoriesRetrieval:
      type: boolean
      description: Whether to retrieve category predictions in the response `extensions.queryCategorization` field.
      default: false
    enableAutoFiltering:
      type: boolean
      description: Whether to automatically apply category-based filters and boosts to search results.
      default: false
