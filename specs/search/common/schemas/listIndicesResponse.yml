listIndicesResponse:
  type: object
  additionalProperties: false
  properties:
    items:
      type: array
      description: All indices in your Algolia application.
      items:
        $ref: '#/fetchedIndex'
    nbPages:
      type: integer
      description: Number of pages.
      example: 100
  required:
    - items

fetchedIndex:
  type: object
  additionalProperties: false
  properties:
    name:
      type: string
      description: Index name.
      example: 'movies'
    createdAt:
      type: string
      description: Index creation date. An empty string means that the index has no records.
      example: '2022-09-19T16:36:44.471Z'
    updatedAt:
      $ref: '../../../common/responses/common.yml#/updatedAt'
    entries:
      type: integer
      description: Number of records contained in the index.
      example: 100
    dataSize:
      type: integer
      format: int64
      description: Number of bytes of the index in minified format.
      example: 48450
    fileSize:
      type: integer
      format: int64
      description: Number of bytes of the index binary file.
      example: 112927
    lastBuildTimeS:
      type: integer
      description: Last build time.
      example: 3
    numberOfPendingTasks:
      type: integer
      default: 0
      description: Number of pending indexing operations. This value is deprecated and should not be used.
    pendingTask:
      type: boolean
      default: false
      description: A boolean which says whether the index has pending tasks. This value is deprecated and should not be used.
    primary:
      type: string
      description: Only present if the index is a replica. Contains the name of the related primary index.
      example: 'T02'
    replicas:
      type: array
      items:
        type: string
      description: Only present if the index is a primary index with replicas. Contains the names of all linked replicas.
      example: ['T02_push','T2replica']
    virtual:
      type: boolean
      description: Only present if the index is a [virtual replica](https://www.algolia.com/doc/guides/managing-results/refine-results/sorting/how-to/sort-an-index-alphabetically/#virtual-replicas).
      x-categories:
        - Ranking
    abTest:
      $ref: '#/fetchedIndexAbTest'
    sourceABTest:
      type: string
      description: Name of the index that owns the A/B test configuration. Only present when this index participates in an A/B test configured on another index.
      example: 'movies_dev_a'
  required:
    - name
    - createdAt
    - updatedAt
    - entries
    - dataSize
    - fileSize
    - lastBuildTimeS
    - pendingTask
    - numberOfPendingTasks

fetchedIndexAbTest:
  title: abTest
  type: object
  description: A/B test metadata. Only present if the index is part of an active A/B test.
  properties:
    id:
      type: integer
      description: A/B test ID.
      example: 12345
    version:
      type: integer
      description: A/B test schema version. Only present for v2 and later tests.
      example: 2
    type:
      type: string
      description: A/B test type. Only present for v2 and later tests. Currently always `index-configuration`.
      example: 'index-configuration'
    target:
      $ref: '#/fetchedIndexAbTestTarget'
    variants:
      type: array
      description: A/B test variants.
      items:
        $ref: '#/fetchedIndexAbTestVariant'
  required:
    - id
    - variants

fetchedIndexAbTestTarget:
  title: abTestTarget
  type: object
  description: A/B test target criteria. Only present for v2 and later tests.
  properties:
    indexName:
      type: string
      description: Index name to match. Use `*` to target the entire application.
      example: 'movies'
  required:
    - indexName

fetchedIndexAbTestVariant:
  title: abTestVariant
  type: object
  description: A/B test variant for an index.
  properties:
    indexName:
      type: string
      description: Index name of the variant. Only present for v0/v1 tests; in v2 this moves into `payload`.
      example: 'movies'
    percentage:
      type: integer
      description: Percentage of search traffic routed to this variant.
      example: 50
    customSearchParameters:
      type: string
      description: URL-encoded custom search parameters applied to this variant. Only present for v0/v1 tests; in v2 this moves into `payload`.
    payload:
      type: object
      additionalProperties: true
      description: Type-specific configuration. Only present for v2 and later tests. Shape depends on the parent A/B test's `type`.
  required:
    - percentage
