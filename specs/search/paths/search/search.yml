post:
  tags:
    - Search
  operationId: search
  x-use-read-transporter: true
  x-cacheable: true
  x-legacy-signature: true
  x-acl:
    - search
  summary: Search multiple queries
  description: |
    Runs multiple search queries against one or more indices in a single API request.

    Use cases include:

    - Searching different indices, such as products and marketing content.
    - Run multiple queries on the same index with different parameters or filters.

    If you know the expected result type, use the `searchForHits` or `searchForFacets` helper to simplify the response format.
  requestBody:
    required: true
    description: Multi-query search request body. Results are returned in the same order as the requests.
    content:
      application/json:
        schema:
          title: searchMethodParams
          type: object
          additionalProperties: false
          properties:
            requests:
              type: array
              items:
                $ref: '../../common/schemas/SearchQuery.yml#/SearchQuery'
            strategy:
              $ref: '../../common/enums.yml#/searchStrategy'
          required:
            - requests
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            title: searchResponses
            type: object
            additionalProperties: false
            properties:
              results:
                type: array
                items:
                  $ref: '../../common/schemas/SearchResult.yml#/searchResult'
            required:
              - results
    '400':
      $ref: '../../../common/responses/BadRequest.yml'
    '402':
      $ref: '../../../common/responses/FeatureNotEnabled.yml'
    '403':
      $ref: '../../../common/responses/MethodNotAllowed.yml'
    '404':
      $ref: '../../../common/responses/IndexNotFound.yml'
