injectedItemSearchSource:
  title: injectedItemSearchSource
  description: Injected items will originate from a search request performed on the specified index.
  x-discriminator-fields:
    - search
  type: object
  additionalProperties: false
  properties:
    search:
      title: injectedItemSearch
      type: object
      additionalProperties: false
      properties:
        index:
          type: string
          description: Composition Index name.
          example: Products
        params:
          $ref: './SearchQueryParams.yml#/injectedItemsQueryParameters'
      required:
        - index
  required:
    - search

injectedItemExternalSource:
  title: injectedItemExternalSource
  description: Injected items will originate from externally provided objectIDs (that must exist in the index) given at runtime in the run request payload.
  x-discriminator-fields:
    - external
  type: object
  additionalProperties: false
  properties:
    external:
      title: injectedItemExternal
      type: object
      additionalProperties: false
      properties:
        index:
          type: string
          description: Composition Index name.
          example: Products
        params:
          $ref: './SearchQueryParams.yml#/injectedItemsQueryParameters'
        ordering:
          $ref: '#/externalOrdering'
      required:
        - index
  required:
    - external

externalOrdering:
  title: externalOrdering
  description: Ordering to apply on the injected items coming from the external source. 'default' means the items will be ordered as they are in the index (natural relevance) in the smart group. 'userDefined' means the order in which the objectIDs are provided in the run request payload will be preserved in the smart group.
  enum: ['default', 'userDefined']
  default: 'default'

injectedItemRecommendSource:
  title: injectedItemRecommendSource
  description: Injected items will originate from a recommendation request performed on the specified index.
  x-discriminator-fields:
    - recommend
  type: object
  additionalProperties: false
  properties:
    recommend:
      title: recommend
      type: object
      additionalProperties: false
      properties:
        indexName:
          type: string
          description: Index to retrieve recommendations from.
          example: Products
        model:
          $ref: './RecommendModel.yml#/model'
        threshold:
          type: integer
          minimum: 0
          maximum: 100
          description: Minimum score a recommendation must have to be included.
        queryParameters:
          $ref: './SearchQueryParams.yml#/injectedItemsQueryParameters'
        fallbackParameters:
          $ref: './SearchQueryParams.yml#/injectedItemsQueryParameters'
      required:
        - indexName
        - model
        - threshold
  required:
    - recommend