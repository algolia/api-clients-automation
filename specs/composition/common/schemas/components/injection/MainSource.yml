SearchSource:
  description: Organic result set will originate from a search request performed on the specified index.
  x-discriminator-fields:
    - search
  type: object
  additionalProperties: false
  properties:
    search:
      title: mainSearchSource
      type: object
      additionalProperties: false
      properties:
        index:
          type: string
          description: Composition Index name.
          example: Products
        params:
          $ref: './SearchQueryParams.yml#/mainInjectionQueryParameters'
      required:
        - index
  required:
    - search

RecommendSource:
  description: Organic result set will originate from a recommend request.
  x-discriminator-fields:
    - recommend
  type: object
  additionalProperties: false
  properties:
    recommend:
      title: mainRecommendSource
      type: object
      additionalProperties: false
      properties:
        index:
          type: string
          description: Composition Index name.
          example: Products
      required:
        - index
  required:
    - recommend