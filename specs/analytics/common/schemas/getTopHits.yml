topHitsResponse:
  type: object
  title: topHitsResponse
  additionalProperties: false
  required:
    - hits
  properties:
    hits:
      type: array
      description: Most frequent search results.
      items:
        title: topHit
        type: object
        additionalProperties: false
        required:
          - hit
          - count
        properties:
          hit:
            $ref: '../parameters.yml#/hit'
          count:
            $ref: '../../../common/parameters.yml#/count'

topHitsResponseWithAnalytics:
  type: object
  title: topHitsResponseWithAnalytics
  additionalProperties: false
  required:
    - hits
  properties:
    hits:
      type: array
      description: Most frequent search results with click and conversion metrics.
      items:
        title: topHitWithAnalytics
        type: object
        additionalProperties: false
        required:
          - hit
          - count
          - clickThroughRate
          - conversionRate
          - trackedHitCount
          - clickCount
          - conversionCount
        properties:
          hit:
            $ref: '../parameters.yml#/hit'
          count:
            $ref: '../../../common/parameters.yml#/count'
          clickThroughRate:
            $ref: '../parameters.yml#/clickThroughRate'
          conversionRate:
            $ref: '../parameters.yml#/conversionRate'
          trackedHitCount:
            $ref: '../../../common/parameters.yml#/trackedSearchCount'
          clickCount:
            $ref: '../parameters.yml#/clickCount'
          conversionCount:
            $ref: '../parameters.yml#/conversionCount'

topHitsResponseWithRevenueAnalytics:
  type: object
  title: topHitsResponseWithRevenueAnalytics
  additionalProperties: false
  required:
    - hits
  properties:
    hits:
      type: array
      description: Most frequent search results with click, conversion, and revenue metrics.
      items:
        title: topHitWithRevenueAnalytics
        type: object
        additionalProperties: false
        required:
          - hit
          - count
          - clickThroughRate
          - conversionRate
          - trackedHitCount
          - clickCount
          - conversionCount
          - purchaseCount
          - addToCartCount
          - purchaseRate
          - addToCartRate
          - currencies
        properties:
          hit:
            $ref: '../parameters.yml#/hit'
          count:
            $ref: '../../../common/parameters.yml#/count'
          clickThroughRate:
            $ref: '../parameters.yml#/clickThroughRate'
          conversionRate:
            $ref: '../parameters.yml#/conversionRate'
          trackedHitCount:
            $ref: '../../../common/parameters.yml#/trackedSearchCount'
          clickCount:
            $ref: '../parameters.yml#/clickCount'
          conversionCount:
            $ref: '../parameters.yml#/conversionCount'
          addToCartRate:
            $ref: '../parameters.yml#/addToCartRate'
          addToCartCount:
            $ref: '../parameters.yml#/addToCartCount'
          purchaseRate:
            $ref: '../parameters.yml#/purchaseRate'
          purchaseCount:
            $ref: '../parameters.yml#/purchaseCount'
          currencies:
            $ref: '../parameters.yml#/currencies'

getTopHitsResponse:
  title: getTopHitsResponse
  oneOf:
    - $ref: '#/topHitsResponse'
    - $ref: '#/topHitsResponseWithAnalytics'
    - $ref: '#/topHitsResponseWithRevenueAnalytics'
