  /chunkedPush:
    get:
      x-helper: true
      tags:
        - ingestion
      x-available-languages:
        - csharp
        - go
        - java
        - javascript
        - kotlin
        - php
        - python
        - ruby
        - scala
      x-acl:
        - addObject
        - deleteIndex
        - editSettings
      operationId: chunkedPush
      summary: Replace all records in an index
      description: >
        Helper: Chunks the given `objects` list in subset of 1000 elements max
        in order to make it fit in `push` requests by leveraging the
        Transformation pipeline setup in the Push connector
        (https://www.algolia.com/doc/guides/sending-and-managing-data/send-and-update-your-data/connectors/push).
      parameters:
        - in: query
          name: indexName
          description: The `indexName` to replace `objects` in.
          required: true
          schema:
            type: string
        - in: query
          name: objects
          description: List of objects to replace the current objects with.
          required: true
          schema:
            type: array
            items:
              type: object
        - in: query
          name: action
          description: >-
            The `batch` `action` to perform on the given array of `objects`,
            defaults to `addObject`.
          required: false
          schema:
            $ref: '#/components/schemas/Action'
        - in: query
          name: waitForTasks
          description: >-
            Whether to wait until every `batch` task has been processed. This
            may take longer but is more reliable.
          required: false
          schema:
            type: boolean
        - in: query
          name: batchSize
          description: >-
            The size of the chunk of `objects`. The number of `batch` calls will
            be equal to `length(objects) / batchSize`. Defaults to 1,000.
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WatchResponse'
        '400':
          $ref: '#/components/responses/IndexNotFound'
