            type: string
          type: array
          title: agentids
      type: object
      required:
        - id
        - name
        - value
        - createdAt
        - updatedAt
        - lastUsedAt
        - agentIds
      title: secretKeyResponse
    PaginatedSecretKeysResponse:
      properties:
        data:
          items:
            $ref: '#/components/schemas/SecretKeyResponse'
          type: array
          title: data
        pagination:
          $ref: '#/components/schemas/PaginationMetadata'
      type: object
      required:
        - data
        - pagination
      title: paginatedSecretKeysResponse
    SecretKeyCreate:
      properties:
        name:
          type: string
          maxLength: 128
          minLength: 1
          title: name
          description: The name of the secret key.
        agentIds:
          items:
            type: string
          type: array
          title: agentids
          description: List of agent IDs this secret key is associated with.
      type: object
      required:
        - name
      title: secretKeyCreate
      description: Secret key creation payload.
    SecretKeyPatch:
      properties:
        name:
          oneOf:
            - type: string
              maxLength: 128
              minLength: 1
            - type: 'null'
          title: name
          description: The new name of the secret key.
        agentIds:
          oneOf:
            - items:
                type: string
              type: array
