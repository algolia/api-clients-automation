      properties:
        exposed:
          type: boolean
          title: exposed
        default:
          oneOf:
            - type: integer
            - type: 'null'
          title: default
        constraint:
          oneOf:
            - $ref: '#/components/schemas/NumberParamConstraint'
            - type: 'null'
      type: object
      required:
        - exposed
      title: numberParam
      description: >-
        A number search parameter with exposure control and optional
        constraints.
