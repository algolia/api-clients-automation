openapi: 3.0.2
info:
  title: Agent Studio API
  description: >
    The Agent Studio API lets you build and operate generative AI agents that
    use Algolia data, tools, and your chosen LLM provider.


    Use it to create, configure, publish, and update agents, then generate chat
    completions grounded in live data from your Algolia indices. You can manage
    LLM providers, Agent Studio tools, conversations, feedback, secret keys,
    user data, caching, and application settings for your AI experiences.


    ## Beta


    The Agent Studio API is a **beta feature** according to [Algolia's Terms of
    Service ("Beta Services")](https://www.algolia.com/policies/terms/).


    ## Client libraries


    Use Algolia's API clients and libraries to reliably integrate Algolia's APIs
    with your apps.


    For more information, see [Algolia's
    ecosystem](https://www.algolia.com/doc/libraries).


    ## Base URL


    Base URL for the Agent Studio API:


    - `https://{APPLICATION_ID}.algolia.net/agent-studio`


    **All requests must use HTTPS.**


    ## Authentication


    Add these headers to authenticate requests:


    - `x-algolia-application-id`. Your Algolia application ID.

    - `x-algolia-api-key`. An API key with the necessary permissions to make the
    request.
      The required access control list (ACL) to make a request is listed in each endpoint's reference.

    You can find your application ID and API key in the [Algolia
    dashboard](https://dashboard.algolia.com/account/api-keys).


    ## Request format


    Request bodies must be JSON objects.


    ## Response status and errors


    The Agent Studio API returns JSON responses. Since JSON doesn't guarantee
    any specific ordering, don't rely on the order of attributes in the API
    response.


    Successful responses return `2xx` statuses. Client errors return `4xx`
    statuses. Server errors return `5xx` statuses.

    Error responses have a `message` property with more information.


    ## Version


    The current version of the Agent Studio API is version 1, indicated by the
    `/1/` in each endpoint's URL.
  version: 0.1.0
servers:
  - url: https://{APPLICATION_ID}.algolia.net/agent-studio
    description: Agent Studio API.
    variables:
      APPLICATION_ID:
        default: EXAMPLE
        description: Your Algolia application ID.
security:
  - appId: []
    apiKey: []
tags:
  - name: Agents
    description: Manage your agents.
  - name: Allowed Domains
    description: Restrict where an agent's API key may be used.
  - name: Completions
    description: Generate completions.
  - name: Configurations
    description: Manage Agent Studio related application configurations.
  - name: Conversations
    description: View, export, and delete conversation history.
  - name: Feedback
    description: Capture user feedback on agent responses.
  - name: Internal
    description: Endpoints that are needed for internal or integration logic.
  - name: Providers
    description: Manage your LLM providers.
  - name: Secret Keys
    description: Manage secret keys used to authenticate requests.
  - name: User Data
    description: Manage end-user data associated with conversations.
paths:
  /1/agents:
    get:
      tags:
        - agent-studio
      operationId: listAgents
      x-acl:
        - settings
      summary: List Agents
      description: List all agents with pagination and filtering.
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            description: Page number.
            default: 1
            title: page
          description: Page number.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            description: Items per page.
            default: 10
            title: limit
          description: Items per page.
        - name: providerId
          in: query
          required: false
          schema:
            oneOf:
              - type: string
              - type: 'null'
            description: Filter by provider id.
            title: providerid
          description: Filter by provider id.
      responses:
        '200':
          description: Successful Response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAgentsResponse'
        '422':
          description: Validation Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
        - agent-studio
      operationId: createAgent
      x-acl:
        - editSettings
      summary: Create Agent
      description: Create a new agent.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentConfigCreate'
      responses:
        '201':
          description: Successful Response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentWithVersionResponse'
        '422':
          description: Validation Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /1/agents/{agentId}:
    get:
      tags:
        - agent-studio
      operationId: getAgent
      x-acl:
        - settings
      summary: Get Agent
      description: Retrieve details of the specified agent.
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            title: agentId
          description: The agentId.
      responses:
        '200':
          description: Successful Response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentWithVersionResponse'
        '422':
          description: Validation Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
        - agent-studio
      operationId: updateAgent
      x-acl:
        - editSettings
      summary: Update Agent
      description: Update the specified agent.
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            title: agentId
          description: The agentId.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentConfigUpdate'
      responses:
        '200':
          description: Successful Response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentWithVersionResponse'
        '422':
          description: Validation Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
        - agent-studio
      operationId: deleteAgent
      x-acl:
        - editSettings
      summary: Delete Agent
      description: Delete the specified agent.
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            title: agentId
          description: The agentId.
      responses:
        '204':
          description: Successful Response.
        '422':
          description: Validation Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /1/agents/{agentId}/allowed-domains:
    get:
      tags:
        - agent-studio
      operationId: listAgentAllowedDomains
      x-acl:
        - settings
      summary: List Allowed Domains
      description: List all allowed domain patterns for this agent.
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            title: agentId
          description: The agentId.
      responses:
        '200':
          description: Successful Response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AllowedDomainListResponse'
        '422':
          description: Validation Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
        - agent-studio
      operationId: createAgentAllowedDomain
      x-acl:
        - editSettings
      summary: Create Allowed Domain
      description: >-
        Add a single allowed domain pattern (e.g. https://app.example.com or
        *.example.com).
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            title: agentId
          description: The agentId.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AllowedDomainCreate'
      responses:
        '201':
          description: Successful Response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AllowedDomainResponse'
        '422':
          description: Validation Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /1/agents/{agentId}/allowed-domains/bulk:
    post:
      tags:
        - agent-studio
      operationId: bulkCreateAllowedDomains
      x-acl:
        - editSettings
      summary: Bulk Insert Allowed Domains
      description: Add multiple allowed domain patterns. Duplicates are skipped.
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            title: agentId
          description: The agentId.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AllowedDomainBulkInsert'
      responses:
        '201':
          description: Successful Response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AllowedDomainListResponse'
        '422':
          description: Validation Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
        - agent-studio
      operationId: bulkDeleteAllowedDomains
      x-acl:
        - editSettings
      summary: Bulk Delete Allowed Domains
      description: Delete allowed domains by id list.
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            title: agentId
          description: The agentId.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AllowedDomainBulkDelete'
      responses:
        '204':
          description: Successful Response.
        '422':
          description: Validation Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /1/agents/{agentId}/allowed-domains/{domainId}:
    get:
      tags:
        - agent-studio
      operationId: getAllowedDomain
      x-acl:
        - settings
      summary: Get Allowed Domain
      description: Get a single allowed domain by id.
      parameters:
        - name: domainId
          in: path
          required: true
          schema:
            type: string
            title: domainId
          description: The domainId.
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            title: agentId
          description: The agentId.
      responses:
        '200':
          description: Successful Response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AllowedDomainResponse'
        '422':
          description: Validation Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
        - agent-studio
      operationId: deleteAllowedDomain
      x-acl:
        - editSettings
      summary: Delete Allowed Domain
      description: Remove an allowed domain by id.
      parameters:
        - name: domainId
          in: path
          required: true
          schema:
            type: string
            title: domainId
          description: The domainId.
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            title: agentId
          description: The agentId.
      responses:
        '204':
          description: Successful Response.
        '422':
          description: Validation Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /1/agents/{agentId}/cache:
    delete:
      tags:
        - agent-studio
      operationId: invalidateAgentCache
      x-acl:
        - editSettings
      summary: Invalidate Agent Cache
      description: >-
        Invalidate cached completions for this agent. Filter with `before`
        (exclusive).
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            title: agentId
          description: The agentId.
        - name: before
          in: query
          required: false
          schema:
            oneOf:
              - type: string
              - type: 'null'
            description: Delete entries strictly before this date (exclusive, YYYY-MM-DD).
            title: before
          description: Delete entries strictly before this date (exclusive, YYYY-MM-DD).
      responses:
        '204':
          description: Successful Response.
        '422':
          description: Validation Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /1/agents/{agentId}/completions:
    post:
      tags:
        - agent-studio
      operationId: createAgentCompletion
      x-acl:
        - search
      x-streaming: true
      summary: Create Completion
      description: >-
        Create a completion for the specified agent.


        This endpoint handles two types of requests:

        1. Normal completion request: User message -> Agent response

        2. Tool approval response: User approval -> Execute tool -> Agent
        response


        Tool Approval Flow (for MCP tools with requiresApproval: true):

        - Request 1: User sends message -> Agent requests tool call -> Return
        approval request

        - Request 2: User approves -> Execute tool -> Agent continues with
        result.
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/AgentIdUnion'
          description: The agentId.
        - name: compatibilityMode
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/CompatibilityMode'
          description: Compatibility mode for the completion API.
        - name: stream
          in: query
          required: false
          schema:
            type: boolean
            description: Whether to stream the response or not.
            default: true
            title: stream
          description: Whether to stream the response or not.
        - name: cache
          in: query
          required: false
          schema:
            type: boolean
            description: Use cached responses if available.
            default: true
            title: cache
          description: Use cached responses if available.
        - name: memory
          in: query
          required: false
          schema:
            oneOf:
              - const: false
                type: boolean
              - type: 'null'
            description: Set to false to disable memory (enabled by default).
            title: memory
          description: Set to false to disable memory (enabled by default).
        - name: analytics
          in: query
          required: false
          schema:
            type: boolean
            description: >-
              Set to false to skip analytics for this completion (default:
              true). Disables Agent Studio BigQuery analytics, Algolia search
              analytics, click analytics, and query-suggestions training. Useful
              for offline-eval workflows.
            default: true
            title: analytics
          description: >-
            Set to false to skip analytics for this completion (default: true).
            Disables Agent Studio BigQuery analytics, Algolia search analytics,
            click analytics, and query-suggestions training. Useful for
            offline-eval workflows.
        - name: X-Algolia-Secure-User-Token
          in: header
          required: false
          schema:
            oneOf:
              - type: string
              - type: 'null'
            title: x-Algolia-Secure-User-Token
          description: The X-Algolia-Secure-User-Token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentCompletionRequest'
      responses:
        '200':
          description: Successful Response.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '422':
          description: Validation Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /1/agents/{agentId}/conversations:
    get:
      tags:
        - agent-studio
      operationId: listAgentConversations
      x-acl:
        - logs
      summary: List Conversations
      description: Retrieves the conversations for the given agent ID.
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/AgentIdUnion'
          description: The agentId.
        - name: startDate
          in: query
          required: false
          schema:
            oneOf:
              - type: string
              - type: 'null'
            description: 'Filter conversations created after this date (format: YYYY-MM-DD).'
            title: startdate
          description: 'Filter conversations created after this date (format: YYYY-MM-DD).'
        - name: endDate
          in: query
          required: false
          schema:
            oneOf:
              - type: string
              - type: 'null'
            description: >-
              Filter conversations created before this date (format:
              YYYY-MM-DD).
            title: enddate
          description: 'Filter conversations created before this date (format: YYYY-MM-DD).'
        - name: includeFeedback
          in: query
          required: false
          schema:
            oneOf:
              - type: boolean
              - type: 'null'
            description: Include feedback per conversation.
            default: false
            title: includefeedback
          description: Include feedback per conversation.
        - name: feedbackVote
          in: query
          required: false
          schema:
            oneOf:
              - type: integer
                maximum: 1
                minimum: 0
              - type: 'null'
            description: Filter by feedback value (requires includeFeedback=true).
            title: feedbackvote
          description: Filter by feedback value (requires includeFeedback=true).
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            description: Page number.
            default: 1
            title: page
          description: Page number.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            maximum: 100
            minimum: 1
            description: Items per page.
            default: 20
            title: limit
          description: Items per page.
        - name: X-Algolia-Secure-User-Token
          in: header
          required: false
          schema:
            oneOf:
              - type: string
              - type: 'null'
            title: x-Algolia-Secure-User-Token
          description: The X-Algolia-Secure-User-Token.
      responses:
        '200':
          description: Successful Response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedConversationsResponse'
        '422':
          description: Validation Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
        - agent-studio
      operationId: deleteAgentConversations
      x-acl:
        - logs
      summary: Delete Conversations
      description: Deletes the conversations matching the given filers.
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            title: agentId
          description: The agentId.
        - name: startDate
          in: query
          required: false
          schema:
            oneOf:
              - type: string
              - type: 'null'
            description: 'Filter conversations created after this date (format: YYYY-MM-DD).'
            title: startdate
          description: 'Filter conversations created after this date (format: YYYY-MM-DD).'
        - name: endDate
          in: query
          required: false
          schema:
            oneOf:
              - type: string
              - type: 'null'
            description: >-
              Filter conversations created before this date (format:
              YYYY-MM-DD).
            title: enddate
          description: 'Filter conversations created before this date (format: YYYY-MM-DD).'
      responses:
        '204':
          description: Successful Response.
        '422':
          description: Validation Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /1/agents/{agentId}/conversations/export:
    get:
      tags:
        - agent-studio
      operationId: exportConversations
      x-acl:
        - logs
      summary: Export Conversations
      description: Exports all conversations based on the passed filters.
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            title: agentId
          description: The agentId.
        - name: startDate
          in: query
          required: false
          schema:
            oneOf:
              - type: string
              - type: 'null'
            description: 'Filter conversations created after this date (format: YYYY-MM-DD).'
            title: startdate
          description: 'Filter conversations created after this date (format: YYYY-MM-DD).'
        - name: endDate
          in: query
          required: false
          schema:
            oneOf:
              - type: string
              - type: 'null'
            description: >-
              Filter conversations created before this date (format:
              YYYY-MM-DD).
            title: enddate
          description: 'Filter conversations created before this date (format: YYYY-MM-DD).'
      responses:
        '200':
          description: Successful Response.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConversationFullResponse'
        '422':
          description: Validation Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /1/agents/{agentId}/conversations/{conversationId}:
    get:
      tags:
        - agent-studio
      operationId: getConversation
      x-acl:
        - logs
      summary: Get Conversation
      description: Retrieves the conversation and its messages for the given ID.
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            title: conversationId
          description: The conversationId.
        - name: agentId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/AgentIdUnion'
          description: The agentId.
        - name: includeFeedback
          in: query
          required: false
          schema:
            type: boolean
            description: Include feedback for the conversation.
            default: false
            title: includefeedback
          description: Include feedback for the conversation.
        - name: X-Algolia-Secure-User-Token
          in: header
          required: false
          schema:
            oneOf:
              - type: string
              - type: 'null'
            title: x-Algolia-Secure-User-Token
          description: The X-Algolia-Secure-User-Token.
      responses:
        '200':
          description: Successful Response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationFullResponse'
        '422':
          description: Validation Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
        - agent-studio
      operationId: deleteConversation
      x-acl:
        - logs
      summary: Delete Conversation
      description: Deletes the conversation with the given ID.
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            title: conversationId
          description: The conversationId.
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            title: agentId
          description: The agentId.
      responses:
        '204':
          description: Successful Response.
        '422':
          description: Validation Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /1/agents/{agentId}/publish:
    post:
      tags:
        - agent-studio
      operationId: publishAgent
      x-acl:
        - editSettings
      summary: Publish Agent
      description: Publish the specified agent.
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            title: agentId
          description: The agentId.
      responses:
        '200':
          description: Successful Response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentWithVersionResponse'
        '422':
          description: Validation Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /1/agents/{agentId}/unpublish:
    post:
      tags:
        - agent-studio
      operationId: unpublishAgent
      x-acl:
        - editSettings
      summary: Unpublish Agent
      description: Unpublish the specified agent.
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            title: agentId
          description: The agentId.
      responses:
        '200':
          description: Successful Response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentWithVersionResponse'
        '422':
          description: Validation Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /1/configuration:
    get:
      tags:
        - agent-studio
      operationId: getConfiguration
      x-acl:
        - logs
      summary: Get Configuration
      description: Get Configuration.
      responses:
        '200':
          description: Successful Response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationConfigResponse'
        '422':
          description: Validation Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
        - agent-studio
      operationId: updateConfiguration
      x-acl:
        - logs
      summary: Patch Configuration
      description: Patch Configuration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationConfigPatch'
      responses:
        '200':
          description: Successful Response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationConfigResponse'
        '422':
          description: Validation Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /1/feedback:
    post:
