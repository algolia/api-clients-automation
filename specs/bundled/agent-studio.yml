      properties:
        exposed:
          type: boolean
          title: exposed
        default:
          oneOf:
            - type: string
            - type: 'null'
          title: default
      type: object
      required:
        - exposed
      title: textParam
      description: A text search parameter with exposure control.
    NumberParamConstraint:
      properties:
        min:
          oneOf:
            - type: integer
            - type: 'null'
