get:
  tags:
  - Secret Keys
  operationId: listSecretKeys
  x-acl:
  - settings
  summary: List Secret Keys
  description: List Secret Keys
  parameters:
  - name: page
    in: query
    required: false
    schema:
      type: integer
      minimum: 1
      description: Page number.
      default: 1
      title: page
    description: Page number.
  - name: limit
    in: query
    required: false
    schema:
      type: integer
      minimum: 1
      description: Items per page.
      default: 10
      title: limit
    description: Items per page.
  responses:
    '200':
      description: Successful Response.
      content:
        application/json:
          schema:
            $ref: ../../common/schemas/PaginatedSecretKeysResponse.yml#/PaginatedSecretKeysResponse
    '422':
      description: Validation Error.
      content:
        application/json:
          schema:
            $ref: ../../common/schemas/HTTPValidationError.yml#/HTTPValidationError
post:
  tags:
  - Secret Keys
  operationId: createSecretKey
  x-acl:
  - admin
  summary: Create Secret Key
  description: Create Secret Key
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../common/schemas/SecretKeyCreate.yml#/SecretKeyCreate
  responses:
    '201':
      description: Successful Response.
      content:
        application/json:
          schema:
            $ref: ../../common/schemas/SecretKeyResponse.yml#/SecretKeyResponse
    '422':
      description: Validation Error.
      content:
        application/json:
          schema:
            $ref: ../../common/schemas/HTTPValidationError.yml#/HTTPValidationError
