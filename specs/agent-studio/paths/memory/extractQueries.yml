post:
  tags:
    - Memory
  operationId: extractQueries
  x-acl:
    - search
  summary: Extract Queries
  description: |-
    Extract optimized search queries from conversation (stateless utility).

    Pure stateless function - converts multi-turn conversation into 1-3 focused search queries.
    Uses entity extraction and YAKE keyword extraction with LRU caching for efficiency.

    Supports both AI SDK v4 and v5 message formats (auto-detected from message structure).

    Use cases:
    - Memory preflight: Extract queries before searching memories
    - Standalone: Convert any conversation to search queries for external use.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../common/schemas/QueryExtractionRequest.yml#/QueryExtractionRequest'
  responses:
    '200':
      description: Successful Response.
      content:
        application/json:
          schema:
            $ref: '../../common/schemas/QueryExtractionResponse.yml#/QueryExtractionResponse'
    '422':
      description: Validation Error.
      content:
        application/json:
          schema:
            $ref: '../../common/schemas/HTTPValidationError.yml#/HTTPValidationError'
