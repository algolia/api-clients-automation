post:
  tags:
    - Memory
  operationId: saveSemanticMemory
  x-acl:
    - logs
  summary: Save Semantic Memory
  description: |-
    Save a semantic memory (facts, preferences).

    Multi-agent support:
    - agent_ids: ["agent1"] - visible to specific agent
    - agent_ids: ["*"] - visible to all agents (brand-level)
    - agent_ids: None - defaults to current agent (if in agent context).
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../common/schemas/MemorySaveRequest.yml#/MemorySaveRequest'
  responses:
    '200':
      description: Successful Response.
      content:
        application/json:
          schema:
            $ref: '../../common/schemas/MemorySaveResponse.yml#/MemorySaveResponse'
    '422':
      description: Validation Error.
      content:
        application/json:
          schema:
            $ref: '../../common/schemas/HTTPValidationError.yml#/HTTPValidationError'
