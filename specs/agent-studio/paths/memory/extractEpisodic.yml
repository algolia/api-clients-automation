post:
  tags:
    - Memory
  operationId: extractEpisodicMemories
  x-acl:
    - logs
  summary: Extract Episodic Memories
  description: |-
    Extract episodic memories (experiences) from conversation using LLM.

    Pure extraction (thinking fast): Single-turn structured output, stateless.

    Returns:
    - memories: Extracted EpisodicMemory objects with OTAR pattern (not saved)
    - message: Summary

    Note: Client must save memories explicitly using POST /memory/episodic.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../common/schemas/MemoryExtractionRequest.yml#/MemoryExtractionRequest'
  responses:
    '200':
      description: Successful Response.
      content:
        application/json:
          schema:
            $ref: '../../common/schemas/MemoryExtractionResponse.yml#/MemoryExtractionResponse'
    '422':
      description: Validation Error.
      content:
        application/json:
          schema:
            $ref: '../../common/schemas/HTTPValidationError.yml#/HTTPValidationError'
