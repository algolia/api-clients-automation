AgentCompletionRequest:
  properties:
    configuration:
      $ref: 'AgentTestConfiguration.yml#/AgentTestConfiguration'
    messages:
      $ref: 'MessagesUnion.yml#/MessagesUnion'
    id:
      type: string
      maxLength: 128
      title: id
      description: Optional conversation id.
    algolia:
      $ref: 'AgentCompletionAlgoliaParams.yml#/AgentCompletionAlgoliaParams'
