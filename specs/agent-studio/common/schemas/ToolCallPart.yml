ToolCallPart:
  properties:
    type:
      type: string
      const: tool-call
      title: type
      default: tool-call
    toolCallId:
      type: string
      title: toolcallid
    toolName:
      type: string
      title: toolname
    args:
      title: args
    requiresApproval:
      oneOf:
        - type: boolean
        - type: 'null'
      title: requiresapproval
    providerOptions:
      oneOf:
        - type: object
          additionalProperties: true
        - type: 'null'
      title: provideroptions
  type: object
  required:
    - toolCallId
    - toolName
    - args
  title: toolCallPart
