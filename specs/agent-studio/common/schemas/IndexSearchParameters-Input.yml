IndexSearchParameters-Input:
  properties:
    query:
      $ref: 'TextParamNullable.yml#/TextParamNullable'
    hitsPerPage:
      $ref: 'NumberParamNullable.yml#/NumberParamNullable'
    page:
      $ref: 'NumberParamNullable.yml#/NumberParamNullable'
    attributesToRetrieve:
      $ref: 'StringArrayParamNullable.yml#/StringArrayParamNullable'
    responseFields:
      $ref: 'StringArrayParamNullable.yml#/StringArrayParamNullable'
    facets:
      $ref: 'FacetsParamNullable.yml#/FacetsParamNullable'
    custom:
      oneOf:
        - additionalProperties: true
          type: object
        - type: 'null'
      title: custom
  type: object
  title: indexSearchParameters
  description: |-
    Structured search parameters configuration for an Algolia index.

    Each parameter controls whether it is exposed to the LLM, its default value,
