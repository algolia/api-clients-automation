MemorySaveRequest:
  properties:
    text:
      type: string
      maxLength: 2000
      minLength: 1
      title: text
      description: Self-contained, first-person memory for long-term recall.
    rawExtract:
      type: string
      maxLength: 5000
      minLength: 1
      title: rawextract
      description: Verbatim extract from conversation, do not paraphrase.
    keywords:
      oneOf:
        - items:
            type: string
          type: array
        - type: 'null'
      title: keywords
      description: '5-20 keywords: entities, context, search terms.'
    topics:
      oneOf:
        - items:
            type: string
          type: array
        - type: 'null'
      title: topics
      description: '2-4 topics from: complaints, entertainment, family, feedback,
        finance, food, goals, health, history, hobbies, learning, praise, preferences,
        schedule, shopping, technical, travel, work.'
    tags:
      oneOf:
        - items:
            type: string
          type: array
        - type: 'null'
      title: tags
      description: Arbitrary labels/themes for flexible categorization.
    recallTriggers:
      oneOf:
        - items:
            type: string
          type: array
        - type: 'null'
      title: recalltriggers
      description: 3-5 natural phrases that should trigger recall.
    agentIds:
      oneOf:
        - items:
            type: string
          type: array
        - type: 'null'
      title: agentids
      description: 'Agent IDs with access: [''agent1''], [''*''] for all, [''*'',
        ''-agent1''] to exclude. If not provided, defaults to requesting agent only.'
    wait:
      type: boolean
      title: wait
      description: Wait for Algolia indexing to complete before returning (ensures
        immediate searchability).
      default: false
  type: object
  required:
    - text
    - rawExtract
  title: memorySaveRequest
  description: Request model for saving a semantic memory.
