ConversationFullResponse:
  properties:
    id:
      type: string
      title: id
    agentId:
      type: string
      title: agentid
    title:
      type: string
      title: title
    createdAt:
      type: string
      title: createdat
    updatedAt:
      type: string
      title: updatedat
    lastActivityAt:
      type: string
      title: lastactivityat
    userToken:
      type: string
      title: usertoken
    isFromDashboard:
      type: boolean
      title: isfromdashboard
      default: false
    messageCount:
      type: integer
      title: messagecount
      default: 0
    totalInputTokens:
      type: integer
      title: totalinputtokens
      default: 0
    totalOutputTokens:
      type: integer
      title: totaloutputtokens
      default: 0
    totalTokens:
      type: integer
      title: totaltokens
      default: 0
    conversationMetadata:
      $ref: 'ConversationMetadata.yml#/ConversationMetadata'
    feedback:
      $ref: 'FeedbackUnion.yml#/FeedbackUnion'
    messages:
      items:
        $ref: 'MessageResponse.yml#/MessageResponse'
      type: array
      title: messages
  type: object
  required:
    - id
    - agentId
    - createdAt
    - updatedAt
    - messages
  title: conversationFullResponse
  description: Response model for a conversation with all its messages.
