MemoryConsolidateRequest:
  properties:
    providerID:
      type: string
      title: providerid
      description: Provider UUID for LLM credentials.
    model:
      type: string
      title: model
      description: Model name (e.g., gpt-4o-mini).
    messages:
      $ref: 'MessagesUnion.yml#/MessagesUnion'
    existingMemories:
      items:
        additionalProperties: true
        type: object
      type: array
      title: existingmemories
      description: Existing memories to consolidate/update/delete (REQUIRED).
    targetMemories:
      type: integer
      maximum: 100.0
      minimum: 1.0
      title: targetmemories
      description: Target number of memories after consolidation.
      default: 10
    maxSteps:
      type: integer
      maximum: 5.0
      minimum: 1.0
      title: maxsteps
      description: LangMem reasoning iterations (2 = Done tool support).
      default: 2
  type: object
  required:
    - providerID
    - model
    - existingMemories
  title: memoryConsolidateRequest
  description: Request to consolidate memories using LLM multi-turn reasoning.
