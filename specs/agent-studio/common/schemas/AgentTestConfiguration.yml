AgentTestConfiguration:
  properties:
    id:
      oneOf:
      - type: string
      - type: 'null'
      title: id
    providerId:
      oneOf:
      - type: string
      - type: 'null'
      title: providerid
    model:
      oneOf:
      - type: string
      - type: 'null'
      title: model
    instructions:
      type: string
      title: instructions
    systemPrompt:
      oneOf:
      - type: string
      - type: 'null'
      title: systemprompt
    config:
      additionalProperties: true
      type: object
      title: config
    tools:
      items:
        $ref: ToolConfigInput.yml#/ToolConfigInput
      type: array
      title: tools
  type: object
  required:
  - instructions
  - config
  - tools
  title: agentTestConfiguration
  description: Dynamic configuration for testing agents.
