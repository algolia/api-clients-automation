AgentTestConfiguration:
  properties:
    id:
      type: string
      title: id
    providerId:
      type: string
      title: providerid
    model:
      type: string
      title: model
    instructions:
      type: string
      title: instructions
    systemPrompt:
      type: string
      title: systemprompt
    config:
      additionalProperties: true
      type: object
