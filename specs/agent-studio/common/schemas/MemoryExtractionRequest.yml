MemoryExtractionRequest:
  properties:
    providerID:
      type: string
      title: providerid
      description: Provider UUID for LLM credentials.
    model:
      type: string
      title: model
      description: Model name (e.g., gpt-4o-mini).
    messages:
      $ref: 'MessagesUnion.yml#/MessagesUnion'
    targetMemories:
      type: integer
      maximum: 50.0
      minimum: 1.0
      title: targetmemories
      description: Target number of memories to extract.
      default: 10
    instructions:
      oneOf:
        - type: string
          maxLength: 50000
        - type: 'null'
      title: instructions
      description: Optional task-specific context to guide memory extraction (e.g.,
        domain focus, priority signals).
  type: object
  required:
    - providerID
    - model
    - messages
  title: memoryExtractionRequest
  description: Request to extract NEW memories from conversation (thinking fast).
