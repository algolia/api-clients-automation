MessageResponse:
  properties:
    id:
      type: string
      title: id
    conversationId:
      type: string
      title: conversationid
    role:
      $ref: 'MessageRole.yml#/MessageRole'
    parts:
      items:
        $ref: 'MessagePart.yml#/MessagePart'
      type: array
      title: parts
    createdAt:
      type: string
      title: createdat
    updatedAt:
      type: string
      title: updatedat
    model:
      type: string
      title: model
    inputTokens:
      type: integer
      title: inputtokens
    outputTokens:
      type: integer
      title: outputtokens
    turnContext:
      additionalProperties:
        type: string
      type: object
      title: turncontext
  type: object
  required:
    - id
    - conversationId
    - role
    - parts
    - createdAt
    - updatedAt
  title: messageResponse
  description: Response model for a message.
