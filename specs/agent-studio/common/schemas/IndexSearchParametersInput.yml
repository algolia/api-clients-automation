IndexSearchParameters-Input:
  properties:
    query:
      oneOf:
        - $ref: 'TextParam.yml#/TextParam'
        - type: 'null'
    hitsPerPage:
      $ref: 'NumberParam.yml#/NumberParam'
    page:
      $ref: 'NumberParam.yml#/NumberParam'
    attributesToRetrieve:
      $ref: 'StringArrayParam.yml#/StringArrayParam'
    responseFields:
      $ref: 'StringArrayParam.yml#/StringArrayParam'
    facets:
      oneOf:
        - $ref: 'FacetsParam.yml#/FacetsParam'
        - type: 'null'
    custom:
      oneOf:
        - additionalProperties: true
          type: object
        - type: 'null'
      title: custom
  type: object
  title: indexSearchParameters
  description: |-
    Structured search parameters configuration for an Algolia index.

    Each parameter controls whether it is exposed to the LLM, its default value,
    optional constraints, and merge behavior.
