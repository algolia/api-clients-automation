AgentConfigCreate:
  properties:
    name:
      type: string
      title: name
    description:
      oneOf:
      - type: string
      - type: 'null'
      title: description
    providerId:
      oneOf:
      - type: string
      - type: 'null'
      title: providerid
    model:
      oneOf:
      - type: string
      - type: 'null'
      title: model
    instructions:
      type: string
      title: instructions
      description: 'The agent prompt: defines the agent''s role, tone, and goals.
        Guides how it answers using the provided context. Corresponds to the ''Agent
        prompt'' field in the dashboard.'
    systemPrompt:
      oneOf:
      - type: string
      - type: 'null'
      title: systemprompt
      description: 'The system prompt: defines system-level rules and constraints.
        Guides how the agent uses tools, features, and generates context. Prepended
        before `instructions` in the final prompt sent to the LLM. Typically injected
        by an agent template — modify with caution, as changes may affect behavior,
        tool usage, or response accuracy. Corresponds to the ''System prompt'' field
        in the dashboard.'
    templateType:
      oneOf:
      - type: string
      - type: 'null'
      title: templatetype
    config:
      additionalProperties: true
      type: object
      title: config
      default: {}
      example:
        sendUsage: true
        sendReasoning: true
        temperature: 0.7
        max_tokens: 1500
        reasoning: '{summary: auto}'
        features: '[memory]'
    tools:
      items:
        $ref: ToolConfigInput.yml#/ToolConfigInput
      type: array
      title: tools
  type: object
  required:
  - name
  - instructions
  title: agentConfigCreate
