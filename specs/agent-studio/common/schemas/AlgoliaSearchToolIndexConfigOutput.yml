AlgoliaSearchToolIndexConfig-Output:
  properties:
    index:
      type: string
      maxLength: 100
      minLength: 1
      title: index
    description:
      type: string
      maxLength: 3000
      minLength: 1
      title: description
    enhancedDescription:
      type: string
      title: enhanceddescription
      default: ''
    searchParameters:
      oneOf:
        - $ref: 'SearchParametersOutput.yml#/SearchParameters-Output'
        - type: 'null'
    searchControls:
      oneOf:
        - $ref: 'IndexSearchParametersOutput.yml#/IndexSearchParameters-Output'
        - type: 'null'
  type: object
  required:
    - index
    - description
  title: algoliaSearchToolIndexConfig
