ToolPartV5:
  properties:
    type:
      type: string
      title: type
    toolCallId:
      type: string
      title: toolcallid
    state:
      $ref: ToolState.yml#/ToolState
    input:
      additionalProperties: true
      type: object
      title: input
    output:
      oneOf:
      - type: object
        additionalProperties: true
      - type: 'null'
      title: output
    errorText:
      oneOf:
      - type: string
      - type: 'null'
      title: errortext
    providerOptions:
      oneOf:
      - additionalProperties: true
        type: object
      - type: 'null'
      title: provideroptions
    requiresApproval:
      oneOf:
      - type: boolean
      - type: 'null'
      title: requiresapproval
    description:
      oneOf:
      - type: string
      - type: 'null'
      title: description
    argsHash:
      oneOf:
      - type: string
      - type: 'null'
      title: argshash
  type: object
  required:
  - type
  - toolCallId
  title: toolPartV5
  description: Model for tool invocation in a Message.
