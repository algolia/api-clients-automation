event:
  title: event
  type: object
  properties:
    type:
      $ref: '#/eventType'
    subtype:
      $ref: '#/subtype'
    name:
      type: string
  required: [type, name]

events:
  title: events
  type: object
  properties:
    viewDetails:
      type: array
      items:
        $ref: '#/event'
    viewListing:
      type: array
      items:
        $ref: '#/event'
    addToCart:
      type: array
      items:
        $ref: '#/event'
    purchase:
      type: array
      items:
        $ref: '#/event'
  required: [viewDetails, viewListing, addToCart, purchase]

issue:
  title: issue
  type: object
  description: An issue is either an 'error' or a 'warning' that is generated by the validator.
  properties:
    code:
      type: string
    index:
      type: string
    message:
      type: string
  required: [code, index, message]

personalizationReRanking:
  title: personalizationReRanking
  type: string
  description: The impact that personalization has on the re-ranking of search results.
  enum: [none, low, medium, high, maximum]

profileType:
  title: profileType
  type: string
  enum: [basic]
  description: |
    The type of user profiles to generate.

    Basic profiles are based on past behaviors, ensuring search results align with previous interests.

eventType:
  title: eventType
  type: string
  enum: [view, click, conversion]

subtype:
  title: subtype
  type: string
  enum: [addToCart, purchase]

status:
  title: status title
  type: object
  properties:
    type:
      $ref: '../enums.yml#/status'
    errors:
      type: array
      items:
        $ref: '../enums.yml#/errorCodes'
    lastUpdatedAt:
      type: string

features:
  title: features
  type: object
  properties:
    realtime:
      $ref: '#/realtime'

realtime:
  title: realtime
  type: object
  properties:
    enabled:
      type: boolean
      description: Whether the realtime personalization feature is enabled.
