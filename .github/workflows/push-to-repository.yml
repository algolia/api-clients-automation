name: Push generated files to the given repository

on:
  workflow_dispatch:
    inputs:
      name:
        description: 'the name of the repository to push files to'
        required: true
        type: choice
        options:
          - AlgoliaWeb
          - mcp-node
          - docs-new
          - n8n-nodes-algolia

jobs:
  push:
    name: Push generated files to the given repository
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Setup
        id: setup
        uses: ./.github/actions/setup
        with:
          type: minimal

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.ALGOLIA_BOT_APP_ID }}
          private-key: ${{ secrets.ALGOLIA_BOT_PRIVATE_KEY }}
          owner: algolia

      - run: yarn workspace scripts pushToRepository ${{ inputs.name }} 
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          FORCE: true
