name: Scheduled/Manual Release

on:
  schedule:
    - cron: '30 6 * * 2'
  workflow_dispatch:

jobs:
  release:
    name: Scheduled/Manual Release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Setup
        id: setup
        uses: ./.github/actions/setup
        with:
          type: minimal
          language: dart # we need the dart deps because we use melos to bump dependencies for its client

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.ALGOLIA_BOT_CLIENT_ID }}
          private-key: ${{ secrets.ALGOLIA_BOT_PRIVATE_KEY }}

      - run: yarn cli release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
