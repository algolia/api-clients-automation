            val client =
              AgentStudioClient(
                appId = "ALGOLIA_APPLICATION_ID",
                apiKey = "ALGOLIA_API_KEY",
                region = "ALGOLIA_APPLICATION_REGION",
              )

            // Call the API
            var response = client.listAgents()


            // print the response
            println(response)
        - lang: php
          label: PHP
          source: >-
