  /1/agents:
    get:
      tags:
        - Agents
      operationId: listAgents
      x-acl:
        - settings
      summary: List Agents
      description: List all agents with pagination and filtering.
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            description: Page number.
            default: 1
            title: page
          description: Page number.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            description: Items per page.
            default: 10
            title: limit
          description: Items per page.
        - name: providerId
          in: query
          required: false
          schema:
            oneOf:
              - type: string
              - type: 'null'
            description: Filter by provider id.
            title: providerid
          description: Filter by provider id.
      responses:
        '200':
          description: Successful Response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAgentsResponse'
        '422':
          description: Validation Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      x-codeSamples:
        - lang: csharp
          label: C#
          source: |-
            // Initialize the client
            var client = new AgentStudioClient(
              new AgentStudioConfig(
                "ALGOLIA_APPLICATION_ID",
                "ALGOLIA_API_KEY",
                "ALGOLIA_APPLICATION_REGION"
              )
            );

            // Call the API
            var response = await client.ListAgentsAsync();

            // print the response
            Console.WriteLine(response);
        - lang: go
          label: Go
          source: >-
            // Initialize the client with your application region, eg.
            agentStudio.ALGOLIA_APPLICATION_REGION

            client, err := agentStudio.NewClient("ALGOLIA_APPLICATION_ID",
            "ALGOLIA_API_KEY", agentStudio.US)

            if err != nil {
              // The client can fail to initialize if you pass an invalid parameter.
              panic(err)
            }


            // Call the API

            response, err := client.ListAgents(client.NewApiListAgentsRequest())

            if err != nil {
              // handle the eventual error
              panic(err)
            }



            // print the response

            print(response)
        - lang: java
          label: Java
          source: >-
            // Initialize the client

            AgentStudioClient client = new
            AgentStudioClient("ALGOLIA_APPLICATION_ID", "ALGOLIA_API_KEY",
            "ALGOLIA_APPLICATION_REGION");


            // Call the API

            PaginatedAgentsResponse response = client.listAgents();


            // print the response

            System.out.println(response);
        - lang: javascript
          label: JavaScript
          source: >-
            // Initialize the client

            // Replace 'us' with your Algolia Application Region

            const client = agentStudioClient('ALGOLIA_APPLICATION_ID',
            'ALGOLIA_API_KEY', 'us');


            // Call the API

            const response = await client.listAgents();



            // print the response

            console.log(response);
        - lang: kotlin
          label: Kotlin
          source: |-
